name: Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint --workspaces

  npm-license-checker:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - run: npm ci
      - run: npm run coverage --workspace=npm-license-checker

  npm-license-checker-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        fixture:
          - name: npm-single
            pm: npm
            install: 'npm ci'
            expect: '@deque/npm-license-checker-action-npm-single-fixture@1.0.0 is-number@7.0.0'
          - name: npm-workspaces
            pm: npm
            install: 'npm ci'
            expect: '@deque/npm-license-checker-action-npm-workspaces-fixture@1.0.0 @deque/npm-license-checker-action-app-a@1.0.0 @deque/npm-license-checker-action-app-b@1.0.0 is-number@7.0.0 is-number@6.0.0 is-odd@3.0.1'
          - name: pnpm-single
            pm: pnpm
            install: 'pnpm install --frozen-lockfile'
            expect: '@deque/npm-license-checker-action-pnpm-single-fixture@1.0.0 is-number@7.0.0 is-odd@3.0.1'
          - name: pnpm-workspaces
            pm: pnpm
            install: 'pnpm install --frozen-lockfile'
            expect: '@deque/npm-license-checker-action-pnpm-workspaces-fixture@1.0.0 @deque/npm-license-checker-action-app-a@1.0.0 @deque/npm-license-checker-action-app-b@1.0.0 is-number@7.0.0 is-odd@3.0.1'
          - name: yarn-single
            pm: yarn
            install: 'yarn install --frozen-lockfile'
            expect: '@deque/npm-license-checker-action-yarn-single-fixture@1.0.0 is-number@7.0.0'
          - name: yarn-workspaces
            pm: yarn
            install: 'yarn install --frozen-lockfile'
            expect: '@deque/npm-license-checker-action-yarn-workspaces-fixture@1.0.0 @deque/npm-license-checker-action-app-a@1.0.0 @deque/npm-license-checker-action-app-b@1.0.0 is-number@7.0.0 is-number@6.0.0 is-odd@3.0.1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - if: matrix.fixture.pm == 'pnpm'
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - run: npm ci
      - run: npm run build --workspace=npm-license-checker
      - name: Install fixture deps
        working-directory: .github/actions/npm-license-checker/src/fixtures/${{ matrix.fixture.name }}
        run: ${{ matrix.fixture.install }}
      - uses: ./.github/actions/npm-license-checker
        with:
          start-paths: .github/actions/npm-license-checker/src/fixtures/${{ matrix.fixture.name }}
          dependency-type: production
          details-output-path: /tmp/credits.json
      - name: Verify output
        run: |
          test -s /tmp/credits.json
          expected=$(echo "${{ matrix.fixture.expect }}" | tr ' ' '\n' | sort)
          actual=$(jq -r 'keys[]' /tmp/credits.json | sort)
          if ! diff <(echo "$expected") <(echo "$actual"); then
            echo "Expected packages did not match actual output"
            echo "Full output:"
            cat /tmp/credits.json
            exit 1
          fi

  a11y-sla-breach-labels:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - run: npm run coverage --workspace=a11y-sla-breach-labels

  create-temp-package-json-v1:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - run: npm run coverage --workspace=create-temp-package-json-v1
